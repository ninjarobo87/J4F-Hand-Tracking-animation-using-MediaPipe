<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CAT'S CRADLE — NEON HAND INTERFACE</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #030312;
    font-family: 'Share Tech Mono', monospace;
  }

  #app {
    position: relative;
    width: 100vw; height: 100vh;
  }

  #videoEl {
    position: absolute;
    width: 1px; height: 1px;
    opacity: 0;
    pointer-events: none;
  }

  #mainCanvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    display: block;
  }

  #scanlines {
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 3px,
      rgba(0, 0, 0, 0.18) 3px,
      rgba(0, 0, 0, 0.18) 4px
    );
    pointer-events: none;
    z-index: 10;
    animation: scanRoll 12s linear infinite;
  }

  @keyframes scanRoll {
    0%   { background-position: 0 0; }
    100% { background-position: 0 100px; }
  }

  #vignette {
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at 50% 50%,
      transparent 40%, rgba(0,0,5,0.82) 100%);
    pointer-events: none;
    z-index: 9;
  }

  #hud {
    position: fixed;
    top: 0; left: 0; right: 0;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 18px 24px;
    z-index: 20;
    pointer-events: none;
  }

  .hud-block { display: flex; flex-direction: column; gap: 4px; }

  .hud-label {
    font-size: 10px;
    letter-spacing: 4px;
    color: rgba(0, 255, 255, 0.45);
    text-transform: uppercase;
  }

  .hud-value {
    font-size: 13px;
    letter-spacing: 2px;
    color: rgba(0, 255, 255, 0.9);
    text-shadow: 0 0 12px rgba(0,255,255,0.8);
  }

  #status-dot {
    display: inline-block;
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #00ffcc;
    box-shadow: 0 0 8px #00ffcc;
    margin-right: 6px;
    animation: pulse 1.6s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%       { opacity: 0.4; transform: scale(0.7); }
  }

  #corner-tl, #corner-tr, #corner-bl, #corner-br {
    position: fixed;
    width: 20px; height: 20px;
    z-index: 20;
    pointer-events: none;
  }
  #corner-tl { top: 12px; left: 12px; border-top: 1px solid rgba(0,255,255,0.4); border-left: 1px solid rgba(0,255,255,0.4); }
  #corner-tr { top: 12px; right: 12px; border-top: 1px solid rgba(0,255,255,0.4); border-right: 1px solid rgba(0,255,255,0.4); }
  #corner-bl { bottom: 12px; left: 12px; border-bottom: 1px solid rgba(0,255,255,0.4); border-left: 1px solid rgba(0,255,255,0.4); }
  #corner-br { bottom: 12px; right: 12px; border-bottom: 1px solid rgba(0,255,255,0.4); border-right: 1px solid rgba(0,255,255,0.4); }

  #instructions {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 10px;
    letter-spacing: 3px;
    color: rgba(0,200,255,0.35);
    z-index: 20;
    pointer-events: none;
    text-align: center;
    white-space: nowrap;
  }
</style>
</head>
<body>
<div id="app">
  <video id="videoEl" playsinline autoplay muted></video>
  <canvas id="mainCanvas"></canvas>
  <div id="scanlines"></div>
  <div id="vignette"></div>

  <div id="hud">
    <div class="hud-block">
      <span class="hud-label">System</span>
      <span class="hud-value">CAT'S CRADLE v1.0</span>
    </div>
    <div class="hud-block" style="text-align:center;">
      <span class="hud-label">Status</span>
      <span class="hud-value" id="statusText"><span id="status-dot"></span>INIT</span>
    </div>
    <div class="hud-block" style="text-align:right;">
      <span class="hud-label">Hands</span>
      <span class="hud-value" id="handCount">0 / 2</span>
    </div>
  </div>

  <div id="corner-tl"></div>
  <div id="corner-tr"></div>
  <div id="corner-bl"></div>
  <div id="corner-br"></div>
  <div id="instructions">RAISE BOTH HANDS — FINGERTIPS CONNECT WHEN CLOSE</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>

<script>
// ─────────────────────────────────────────────────────────────────────────────
//  CONSTANTS
// ─────────────────────────────────────────────────────────────────────────────
const TIPS = [4, 8, 12, 16, 20];
const TIP_COLORS = ['#ff00ff', '#00ffff', '#ffff00', '#00ff88', '#ff6622'];

const CONNECTIONS = [
  [0,1],[1,2],[2,3],[3,4],
  [0,5],[5,6],[6,7],[7,8],
  [0,9],[9,10],[10,11],[11,12],
  [0,13],[13,14],[14,15],[15,16],
  [0,17],[17,18],[18,19],[19,20],
  [5,9],[9,13],[13,17],[0,17]
];

// ─────────────────────────────────────────────────────────────────────────────
//  SHARED STATE
// ─────────────────────────────────────────────────────────────────────────────
let handsData = [];
let particles = [];
let explosionCooldown = {};
let frameCount = 0;

// ─────────────────────────────────────────────────────────────────────────────
//  PARTICLE
// ─────────────────────────────────────────────────────────────────────────────
class Particle {
  constructor(x, y, col) {
    this.x = x; this.y = y;
    const angle = Math.random() * Math.PI * 2;
    const speed = 2 + Math.random() * 10;
    this.vx = Math.cos(angle) * speed;
    this.vy = Math.sin(angle) * speed;
    this.life = 1.0;
    this.decay = 0.018 + Math.random() * 0.025;
    this.size = 1.5 + Math.random() * 4;
    this.col = col;
    this.trail = [];
  }

  update() {
    this.trail.push({ x: this.x, y: this.y });
    if (this.trail.length > 5) this.trail.shift();
    this.x += this.vx;
    this.y += this.vy;
    this.vx *= 0.92;
    this.vy *= 0.92;
    this.vy += 0.08;
    this.life -= this.decay;
  }

  draw(ctx) {
    if (this.life <= 0) return;
    ctx.save();

    // Trail
    if (this.trail.length > 1) {
      ctx.shadowBlur = 6;
      ctx.shadowColor = this.col;
      for (let i = 1; i < this.trail.length; i++) {
        const t = i / this.trail.length;
        ctx.globalAlpha = this.life * t * 0.4;
        ctx.strokeStyle = this.col;
        ctx.lineWidth = this.size * t * 0.8;
        ctx.beginPath();
        ctx.moveTo(this.trail[i-1].x, this.trail[i-1].y);
        ctx.lineTo(this.trail[i].x, this.trail[i].y);
        ctx.stroke();
      }
    }

    // Core
    ctx.globalAlpha = this.life;
    ctx.shadowBlur = 15;
    ctx.shadowColor = this.col;
    ctx.fillStyle = this.col;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size * this.life, 0, Math.PI * 2);
    ctx.fill();

    // Bright center
    ctx.globalAlpha = this.life * 0.9;
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size * this.life * 0.35, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
  }

  isDead() { return this.life <= 0; }
}

// ─────────────────────────────────────────────────────────────────────────────
//  P5 SKETCH
// ─────────────────────────────────────────────────────────────────────────────
const sketch = (p) => {

  const lmXY = (lm) => ({
    x: (1 - lm.x) * p.width,
    y: lm.y * p.height
  });

  const dist2 = (a, b) => {
    const dx = a.x - b.x, dy = a.y - b.y;
    return Math.sqrt(dx*dx + dy*dy);
  };

  // ── Draw glowing hand silhouette ──────────────────────────────────────────
  const drawSilhouette = (lm, accentCol) => {
    const ctx = p.drawingContext;
    ctx.save();
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';

    // Outer glow pass
    ctx.shadowBlur = 28;
    ctx.shadowColor = accentCol;
    ctx.strokeStyle = accentCol.replace(')', ',0.2)').replace('rgb', 'rgba');
    ctx.lineWidth = 18;
    for (const [a, b] of CONNECTIONS) {
      const pa = lmXY(lm[a]), pb = lmXY(lm[b]);
      ctx.beginPath();
      ctx.moveTo(pa.x, pa.y);
      ctx.lineTo(pb.x, pb.y);
      ctx.stroke();
    }

    // Inner definition pass
    ctx.shadowBlur = 8;
    ctx.strokeStyle = accentCol.replace(')', ',0.55)').replace('rgb', 'rgba');
    ctx.lineWidth = 5;
    for (const [a, b] of CONNECTIONS) {
      const pa = lmXY(lm[a]), pb = lmXY(lm[b]);
      ctx.beginPath();
      ctx.moveTo(pa.x, pa.y);
      ctx.lineTo(pb.x, pb.y);
      ctx.stroke();
    }

    ctx.restore();
  };

  // ── Draw joint dots ───────────────────────────────────────────────────────
  const drawJoints = (lm) => {
    const ctx = p.drawingContext;
    ctx.save();
    for (let i = 0; i < lm.length; i++) {
      const pt = lmXY(lm[i]);
      const tipIdx = TIPS.indexOf(i);
      const isTip = tipIdx !== -1;
      const col = isTip ? TIP_COLORS[tipIdx] : 'rgba(130, 210, 255, 0.85)';
      const r = isTip ? 7 : 3.5;
      const blur = isTip ? 22 : 8;

      ctx.shadowBlur = blur;
      ctx.shadowColor = col;

      // Outer ring for tips
      if (isTip) {
        ctx.globalAlpha = 0.3 + 0.15 * Math.sin(frameCount * 0.08 + tipIdx);
        ctx.fillStyle = col;
        ctx.beginPath();
        ctx.arc(pt.x, pt.y, r * 2.5, 0, Math.PI * 2);
        ctx.fill();
      }

      ctx.globalAlpha = 1;
      ctx.fillStyle = col;
      ctx.beginPath();
      ctx.arc(pt.x, pt.y, r, 0, Math.PI * 2);
      ctx.fill();

      // White core
      ctx.shadowBlur = 4;
      ctx.fillStyle = 'rgba(255,255,255,0.85)';
      ctx.beginPath();
      ctx.arc(pt.x, pt.y, r * 0.3, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  };

  // ── Draw elastic laser string between two points ──────────────────────────
  const drawString = (x1, y1, x2, y2, tipIdx) => {
    const ctx = p.drawingContext;
    const d = dist2({x:x1,y:y1},{x:x2,y:y2});
    const maxD = p.width * 0.75;
    const t = Math.min(d / maxD, 1);

    // Width and glow inversely proportional to stretch
    const coreW = p.lerp(3.5, 0.8, t);
    const glowBlur = p.lerp(30, 10, t);

    // Color: cyan→magenta→yellow along distance
    let r, g, b;
    const ct = t * 2;
    if (ct <= 1) {
      r = Math.round(ct * 255);
      g = Math.round((1 - ct) * 255);
      b = 255;
    } else {
      r = 255;
      g = Math.round((ct - 1) * 255);
      b = Math.round((2 - ct) * 255);
    }

    const baseCol = `rgb(${r},${g},${b})`;

    ctx.save();
    ctx.lineCap = 'round';

    // Build gradient along string
    const grad = ctx.createLinearGradient(x1, y1, x2, y2);
    grad.addColorStop(0,   `rgba(0,255,255,${0.9 - t*0.3})`);
    grad.addColorStop(0.35, `rgba(255,0,255,${0.95 - t*0.2})`);
    grad.addColorStop(0.65, `rgba(255,255,0,${0.9 - t*0.2})`);
    grad.addColorStop(1,   `rgba(0,255,255,${0.9 - t*0.3})`);

    // Outermost wide glow
    ctx.shadowBlur = glowBlur * 2.5;
    ctx.shadowColor = baseCol;
    ctx.globalAlpha = 0.18;
    ctx.strokeStyle = baseCol;
    ctx.lineWidth = coreW * 5;
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();

    // Mid glow
    ctx.shadowBlur = glowBlur;
    ctx.globalAlpha = 0.5;
    ctx.strokeStyle = grad;
    ctx.lineWidth = coreW * 2.5;
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();

    // Core laser line
    ctx.shadowBlur = glowBlur * 0.5;
    ctx.shadowColor = '#ffffff';
    ctx.globalAlpha = 0.95;
    ctx.strokeStyle = grad;
    ctx.lineWidth = coreW;
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();

    // Bright white center fiber
    ctx.shadowBlur = 3;
    ctx.globalAlpha = 0.7 * (1 - t * 0.5);
    ctx.strokeStyle = 'rgba(255,255,255,0.9)';
    ctx.lineWidth = coreW * 0.3;
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();

    ctx.restore();
    return t;
  };

  // ── Collision check and particle burst ───────────────────────────────────
  const checkCollisions = (leftLm, rightLm) => {
    const threshold = 45;
    for (let i = 0; i < TIPS.length; i++) {
      const lp = lmXY(leftLm[TIPS[i]]);
      const rp = lmXY(rightLm[TIPS[i]]);
      const d = dist2(lp, rp);

      if (d < threshold) {
        const now = Date.now();
        if (!explosionCooldown[i] || now - explosionCooldown[i] > 250) {
          explosionCooldown[i] = now;
          const mx = (lp.x + rp.x) * 0.5;
          const my = (lp.y + rp.y) * 0.5;
          const col = TIP_COLORS[i];
          for (let j = 0; j < 28; j++) particles.push(new Particle(mx, my, col));
          // Shockwave ring (stored as special particle marker)
          particles.push({ isRing: true, x: mx, y: my, r: 0, maxR: 80, life: 1.0, col });
        }
      }
    }
  };

  // ── Background grid ───────────────────────────────────────────────────────
  const drawGrid = () => {
    const ctx = p.drawingContext;
    ctx.save();
    ctx.strokeStyle = 'rgba(0, 180, 255, 0.04)';
    ctx.lineWidth = 0.5;
    const step = 50;
    for (let x = 0; x < p.width; x += step) {
      ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, p.height); ctx.stroke();
    }
    for (let y = 0; y < p.height; y += step) {
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(p.width, y); ctx.stroke();
    }
    ctx.restore();
  };

  // ─────────────────────────────────────────────────────────────────────────
  p.setup = () => {
    const cnv = p.createCanvas(window.innerWidth, window.innerHeight);
    cnv.parent('app');
    cnv.elt.id = 'mainCanvas';
    p.noSmooth();
    document.getElementById('statusText').innerHTML =
      '<span id="status-dot"></span>WAITING FOR CAMERA';
  };

  p.windowResized = () => {
    p.resizeCanvas(window.innerWidth, window.innerHeight);
  };

  p.draw = () => {
    frameCount++;
    const ctx = p.drawingContext;

    // Midnight blue background with motion blur tail
    ctx.fillStyle = 'rgba(3, 3, 18, 0.82)';
    ctx.fillRect(0, 0, p.width, p.height);

    drawGrid();

    if (handsData.length === 0) {
      // Idle floating text
      ctx.save();
      const pulse = 0.4 + 0.3 * Math.sin(frameCount * 0.04);
      ctx.globalAlpha = pulse;
      ctx.fillStyle = 'rgba(0, 180, 255, 0.8)';
      ctx.font = '12px "Share Tech Mono", monospace';
      ctx.textAlign = 'center';
      ctx.letterSpacing = '6px';
      ctx.shadowBlur = 20;
      ctx.shadowColor = 'rgba(0,200,255,0.6)';
      ctx.fillText('RAISE YOUR HANDS', p.width / 2, p.height / 2);
      ctx.restore();
    }

    let leftLm = null, rightLm = null;

    for (const h of handsData) {
      // MediaPipe "Left" appears on the right side in mirrored display
      if (h.label === 'Left')  rightLm = h.landmarks;
      else                     leftLm  = h.landmarks;
    }

    // Silhouettes
    if (leftLm)  drawSilhouette(leftLm,  'rgb(0,200,255)');
    if (rightLm) drawSilhouette(rightLm, 'rgb(200,0,255)');

    // Strings
    if (leftLm && rightLm) {
      for (let i = 0; i < TIPS.length; i++) {
        const lp = lmXY(leftLm[TIPS[i]]);
        const rp = lmXY(rightLm[TIPS[i]]);
        drawString(lp.x, lp.y, rp.x, rp.y, i);
      }
      checkCollisions(leftLm, rightLm);
    }

    // Joints
    if (leftLm)  drawJoints(leftLm);
    if (rightLm) drawJoints(rightLm);

    // Particles
    for (let i = particles.length - 1; i >= 0; i--) {
      const pt = particles[i];
      if (pt.isRing) {
        pt.r += 4; pt.life -= 0.045;
        if (pt.life <= 0) { particles.splice(i, 1); continue; }
        ctx.save();
        ctx.globalAlpha = pt.life * 0.7;
        ctx.strokeStyle = pt.col;
        ctx.shadowBlur = 15; ctx.shadowColor = pt.col;
        ctx.lineWidth = 2 * pt.life;
        ctx.beginPath();
        ctx.arc(pt.x, pt.y, pt.r, 0, Math.PI * 2);
        ctx.stroke();
        ctx.restore();
      } else {
        pt.update(); pt.draw(ctx);
        if (pt.isDead()) particles.splice(i, 1);
      }
    }
  };
};

// ─────────────────────────────────────────────────────────────────────────────
//  MEDIAPIPE INIT
// ─────────────────────────────────────────────────────────────────────────────
window.addEventListener('load', () => {
  const videoEl = document.getElementById('videoEl');
  const statusEl = document.getElementById('statusText');
  const handCountEl = document.getElementById('handCount');

  new p5(sketch);

  const hands = new Hands({
    locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`
  });

  hands.setOptions({
    maxNumHands: 2,
    modelComplexity: 1,
    minDetectionConfidence: 0.72,
    minTrackingConfidence: 0.55
  });

  hands.onResults(results => {
    handsData = [];
    if (results.multiHandLandmarks && results.multiHandedness) {
      for (let i = 0; i < results.multiHandLandmarks.length; i++) {
        handsData.push({
          landmarks: results.multiHandLandmarks[i],
          label: results.multiHandedness[i].label
        });
      }
    }
    handCountEl.textContent = `${handsData.length} / 2`;
    statusEl.innerHTML =
      `<span id="status-dot"></span>${
        handsData.length === 2 ? 'TRACKING — BOTH HANDS' :
        handsData.length === 1 ? 'TRACKING — 1 HAND'    :
                                  'SCANNING...'
      }`;
  });

  const camera = new Camera(videoEl, {
    onFrame: async () => { await hands.send({ image: videoEl }); },
    width: 1280,
    height: 720
  });

  camera.start()
    .then(() => {
      statusEl.innerHTML = '<span id="status-dot"></span>SCANNING...';
    })
    .catch(err => {
      statusEl.innerHTML = '<span id="status-dot"></span>CAMERA DENIED';
      console.error('Camera error:', err);
    });
});
</script>
</body>
</html>
